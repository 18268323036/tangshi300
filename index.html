<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唐诗三百首</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#faf8f5;--card:#fff;--text:#2c2c2c;--sub:#8a8a8a;
    --accent:#c4956a;--accent2:#a07850;--border:#e8e4df;
    --pinyin:#b08d6e;--shadow:0 2px 16px rgba(0,0,0,.06);
    --radius:12px;
  }
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;
  }
  /* Header */
  .header{
    position:sticky;top:0;z-index:100;
    background:rgba(250,248,245,.92);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);padding:12px 20px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .header h1{font-size:20px;font-weight:600;color:var(--accent2);letter-spacing:2px}
  .header .back-btn{
    display:none;background:none;border:none;font-size:18px;
    color:var(--accent);cursor:pointer;padding:4px 12px;border-radius:8px;
  }
  .header .back-btn:hover{background:rgba(196,149,106,.1)}
  /* Search */
  .search-box{
    position:relative;max-width:220px;
  }
  .search-box input{
    width:100%;padding:6px 12px 6px 32px;border:1px solid var(--border);
    border-radius:20px;font-size:13px;background:var(--card);outline:none;
    transition:border-color .2s;
  }
  .search-box input:focus{border-color:var(--accent)}
  .search-box::before{
    content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;
  }
  /* Home Grid */
  .home{padding:16px 20px 80px}
  .section-title{
    font-size:15px;font-weight:600;color:var(--accent2);
    margin:20px 0 12px;padding-left:4px;
  }
  .poem-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:12px;
  }
  .poem-card{
    background:var(--card);border-radius:var(--radius);padding:16px;
    box-shadow:var(--shadow);cursor:pointer;transition:all .25s;
    border:1px solid transparent;position:relative;overflow:hidden;
  }
  .poem-card:hover{
    transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.1);
    border-color:var(--accent);
  }
  .poem-card .card-title{font-size:16px;font-weight:600;margin-bottom:4px}
  .poem-card .card-author{font-size:12px;color:var(--sub)}
  .poem-card .card-preview{
    font-size:13px;color:var(--sub);margin-top:8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  /* Detail View */
  .detail{display:none;padding:0 20px 80px;max-width:640px;margin:0 auto}
  .detail.active{display:block}
  .home.hidden{display:none}
  /* Image Carousel */
  .carousel{
    position:relative;width:100%;aspect-ratio:16/10;border-radius:var(--radius);
    overflow:hidden;background:#e8e4df;margin:16px 0;
  }
  .carousel img{
    width:100%;height:100%;object-fit:cover;
    transition:opacity .8s ease;position:absolute;top:0;left:0;
  }
  .carousel img.active{opacity:1}
  .carousel img.inactive{opacity:0}
  .carousel-dots{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;
  }
  .carousel-dots span{
    width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);
    transition:all .3s;
  }
  .carousel-dots span.active{background:#fff;width:18px;border-radius:3px}
  /* Poem Content */
  .poem-meta{text-align:center;margin:16px 0 8px}
  .poem-meta h2{font-size:22px;font-weight:700;margin-bottom:4px}
  .poem-meta .author{font-size:14px;color:var(--sub)}
  .poem-dynasty{font-size:12px;color:var(--sub);background:rgba(196,149,106,.1);
    padding:2px 10px;border-radius:10px;display:inline-block;margin-left:6px}
  .poem-body{
    background:var(--card);border-radius:var(--radius);padding:24px 20px;
    box-shadow:var(--shadow);margin:16px 0;
  }
  .poem-line{
    text-align:center;margin:12px 0;font-size:22px;letter-spacing:2px;
    line-height:2.2;padding:4px 10px;border-radius:10px;
    transition:background-color .25s ease,color .25s ease,box-shadow .25s ease;
  }
  .poem-line.reading{
    background:rgba(196,149,106,.12);color:var(--accent2);
    box-shadow:inset 0 0 0 1px rgba(196,149,106,.18);
  }
  .poem-line .char-group{display:inline-block;margin:0 2px}
  .poem-line .pinyin{
    display:block;font-size:11px;color:var(--pinyin);
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    letter-spacing:0;margin-bottom:2px;
  }
  .poem-line .char{
    font-size:22px;font-weight:500;
  }
  .poem-line .char.reading{
    color:var(--accent);transition:color .3s;
  }
  /* Controls */
  .controls{
    display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;
    margin:20px 0;padding:16px;background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .btn{
    border:none;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;background:var(--accent);color:#fff;
  }
  .btn:hover{background:var(--accent2);transform:scale(1.05)}
  .btn-play{width:52px;height:52px;font-size:22px}
  .btn-sm{width:36px;height:36px;font-size:16px;background:var(--border);color:var(--text)}
  .btn-sm:hover{background:#d4d0cb}
  .speed-label{font-size:12px;color:var(--sub);min-width:30px;text-align:center}
  .voice-switch{
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .voice-btn{
    border:1px solid var(--border);background:var(--card);color:var(--text);
    border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;
    transition:all .2s;
  }
  .voice-btn:hover{border-color:var(--accent);color:var(--accent2)}
  .voice-btn.active{
    background:rgba(196,149,106,.12);border-color:var(--accent);color:var(--accent2);
  }
  .audio-status{
    min-height:20px;margin-top:10px;text-align:center;font-size:12px;color:var(--sub);
  }
  /* Progress */
  .progress-bar{
    width:100%;height:3px;background:var(--border);border-radius:2px;
    margin-top:12px;overflow:hidden;
  }
  .progress-bar .fill{height:100%;background:var(--accent);border-radius:2px;
    transition:width .3s;width:0}
  /* Empty State */
  .empty{text-align:center;padding:60px 20px;color:var(--sub)}
  .empty .icon{font-size:48px;margin-bottom:12px}
  /* Loading */
  .loading-overlay{
    position:fixed;inset:0;background:rgba(250,248,245,.9);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:999;transition:opacity .5s;
  }
  .loading-overlay.hide{opacity:0;pointer-events:none}
  .loading-text{font-size:14px;color:var(--sub);margin-top:16px}
  .spinner{
    width:36px;height:36px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Responsive */
  @media(max-width:480px){
    .poem-grid{grid-template-columns:repeat(2,1fr);gap:10px}
    .poem-line{font-size:20px}
    .poem-line .char{font-size:20px}
    .carousel{aspect-ratio:4/3}
  }
  /* Scrollbar */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  /* Fade animation */
  .fade-in{animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">诗韵加载中...</div>
</div>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="goHome()">← 返回</button>
  <h1>📜 唐诗三百首</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索诗名、作者..." oninput="filterPoems()">
  </div>
</div>

<div class="home" id="homeView">
  <div class="section-title">精选唐诗</div>
  <div class="poem-grid" id="poemGrid"></div>
</div>

<div class="detail" id="detailView">
  <div class="carousel" id="carousel">
    <img src="" alt="" class="active" id="img0">
    <img src="" alt="" class="inactive" id="img1">
    <img src="" alt="" class="inactive" id="img2">
    <div class="carousel-dots">
      <span class="active" data-i="0"></span>
      <span data-i="1"></span>
      <span data-i="2"></span>
    </div>
  </div>
  <div class="poem-meta">
    <h2 id="poemTitle"></h2>
    <div><span class="author" id="poemAuthor"></span><span class="poem-dynasty" id="poemDynasty"></span></div>
  </div>
  <div class="poem-body" id="poemBody"></div>
  <div class="controls">
    <div class="voice-switch" id="voiceSwitch">
      <button class="voice-btn" id="voiceFemaleBtn" type="button" onclick="setVoiceMode('female')">女声</button>
      <button class="voice-btn" id="voiceChildBtn" type="button" onclick="setVoiceMode('child')">童声</button>
    </div>
    <button class="btn btn-sm" onclick="changeSpeed(-1)" title="减速">🐢</button>
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="btn btn-sm" onclick="changeSpeed(1)" title="加速">🐇</button>
    <span class="speed-label" id="speedLabel">1.0x</span>
  </div>
  <div class="audio-status" id="audioStatus"></div>
  <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
  <audio id="poemAudio" preload="metadata"></audio>
</div>

// ==================== 全局状态 ====================
const EMPTY_AUDIO_MANIFEST = { voices: {}, tracks: {} };
let audioManifest = EMPTY_AUDIO_MANIFEST;
let currentPoemIndex = null;
let currentPoem = null;
let isPlaying = false;
let speechRate = 1.0;
let currentCharIndex = 0;
let currentLineIndex = -1;
let totalChars = 0;
let currentImgIndex = 0;
let poemAudio = null;
let playbackRequestToken = 0;
let voiceMode = 'female';
try {
  voiceMode = localStorage.getItem('poemVoiceMode') || 'female';
} catch (error) {}

function updateVoiceButtons() {
  const femaleBtn = document.getElementById('voiceFemaleBtn');
  const childBtn = document.getElementById('voiceChildBtn');
  femaleBtn?.classList?.toggle?.('active', voiceMode === 'female');
  childBtn?.classList?.toggle?.('active', voiceMode === 'child');
}

function setAudioStatus(message) {
  const status = document.getElementById('audioStatus');
  if (status) status.textContent = message;
}

function invalidatePlaybackRequest() {
  playbackRequestToken += 1;
  return playbackRequestToken;
}

function isPlaybackRequestCurrent(token) {
  return token === playbackRequestToken;
}

function ensurePoemAudio() {
  if (!poemAudio) {
    poemAudio = document.getElementById('poemAudio');
  }
  if (!poemAudio || poemAudio.__poemAudioBound) return poemAudio;

  poemAudio.onloadedmetadata = () => {
    poemAudio.playbackRate = speechRate;
    const playBtn = document.getElementById('playBtn');
    if (playBtn && poemAudio.src) playBtn.disabled = false;
    if (resolveAudioTrack(currentPoemIndex, voiceMode)) {
      setAudioStatus('');
    }
    syncPlaybackFrame();
  };

  poemAudio.ontimeupdate = () => {
    syncPlaybackFrame();
  };

  poemAudio.onended = () => {
    stopPlay();
  };

  poemAudio.onerror = () => {
    isPlaying = false;
    const playBtn = document.getElementById('playBtn');
    if (playBtn) {
      playBtn.textContent = '▶';
      playBtn.disabled = true;
    }
    setAudioStatus('当前音频加载失败');
  };

  poemAudio.__poemAudioBound = true;
  return poemAudio;
}

function syncPoemAudioSource(track) {
  ensurePoemAudio();
  if (!poemAudio) return;

  if (track?.src) {
    poemAudio.src = track.src;
    if (poemAudio.dataset) poemAudio.dataset.trackSrc = track.src;
    poemAudio.load?.();
    return;
  }

  if (typeof poemAudio.removeAttribute === 'function') {
    poemAudio.removeAttribute('src');
  } else {
    poemAudio.src = '';
  }
  if (poemAudio.dataset) poemAudio.dataset.trackSrc = '';
  poemAudio.load?.();
}

async function loadAudioManifest() {
  try {
    if (typeof fetch !== 'function') {
      throw new Error('fetch unavailable');
    }
    const response = await fetch('audio/manifest.json');
    if (!response.ok) {
      throw new Error(`manifest request failed: ${response.status}`);
    }
    const manifest = await response.json();
    audioManifest = manifest && typeof manifest === 'object' ? manifest : EMPTY_AUDIO_MANIFEST;
    updateVoiceButtons();
    if (currentPoemIndex !== null) {
      preparePoemAudio(currentPoemIndex);
    }
    return audioManifest;
  } catch (error) {
    audioManifest = { voices: {}, tracks: {} };
    syncPoemAudioSource(null);
    setAudioStatus('音频资源尚未准备好');
    const playBtn = document.getElementById('playBtn');
    if (playBtn) playBtn.disabled = true;
    return audioManifest;
  }
}

function resolveAudioTrack(poemId, mode = voiceMode) {
  return audioManifest?.tracks?.[String(poemId)]?.audio?.[mode] || null;
}

function updateCurrentPoemAudioState() {
  if (currentPoemIndex === null) return null;
  return preparePoemAudio(currentPoemIndex);
}

function setVoiceMode(mode) {
  voiceMode = mode === 'child' ? 'child' : 'female';
  try {
    localStorage.setItem('poemVoiceMode', voiceMode);
  } catch (error) {}
  updateVoiceButtons();

  if (currentPoemIndex === null) return;
  if (isPlaying) {
    stopPlay();
    void startPlay({ reset: true }).catch(() => {});
    return;
  }
  preparePoemAudio(currentPoemIndex);
}

function preparePoemAudio(idx = currentPoemIndex) {
  ensurePoemAudio();
  if (idx === null || !poemAudio) return null;

  const track = resolveAudioTrack(idx, voiceMode);
  const playBtn = document.getElementById('playBtn');

  syncPoemAudioSource(track);
  poemAudio.playbackRate = speechRate;
  poemAudio.currentTime = 0;

  if (!track) {
    const missingManifest = !Object.keys(audioManifest.voices || {}).length &&
      !Object.keys(audioManifest.tracks || {}).length;
    if (playBtn) playBtn.disabled = true;
    setAudioStatus(missingManifest ? '音频资源尚未准备好' : '当前声音版本尚未生成');
    return null;
  }

  if (playBtn) playBtn.disabled = false;
  setAudioStatus('');
  return track;
}

function clearLineHighlights() {
  document.querySelectorAll('.poem-line.reading').forEach(el => el.classList.remove('reading'));
  currentLineIndex = -1;
}

function getActiveLineIndex(progressRatio) {
  if (!currentPoem?.lines?.length) return -1;

  const clampedRatio = Math.max(0, Math.min(1, Number(progressRatio) || 0));
  const introUnits = (currentPoem.title?.length || 0) + (currentPoem.author?.length || 0);
  const lineUnits = currentPoem.lines.map(line => line.length);
  const poemUnits = lineUnits.reduce((sum, count) => sum + count, 0);
  const totalUnits = introUnits + poemUnits;
  if (!totalUnits || !poemUnits) return -1;

  const bodyPosition = clampedRatio * totalUnits - introUnits;
  if (bodyPosition <= 0) return -1;

  let passedUnits = 0;
  for (let index = 0; index < lineUnits.length; index++) {
    passedUnits += lineUnits[index];
    if (bodyPosition < passedUnits) return index;
  }

  return lineUnits.length - 1;
}

function highlightLine(index) {
  if (index < 0) {
    clearLineHighlights();
    return;
  }

  const lineEl = document.getElementById(`poem-line-${index}`);
  if (!lineEl) return;
  if (currentLineIndex === index && lineEl.classList.contains('reading')) return;

  clearLineHighlights();
  lineEl.classList.add('reading');
  currentLineIndex = index;
  lineEl.scrollIntoView?.({ behavior: 'smooth', block: 'center' });
}

function syncPlaybackFrame() {
  if (!poemAudio) return;

  const duration = Number(poemAudio.duration) || 0;
  const currentTime = Number(poemAudio.currentTime) || 0;
  const progressRatio = duration > 0 ? Math.max(0, Math.min(1, currentTime / duration)) : 0;

  updateProgress(progressRatio);
  updateImageByProgress(progressRatio);

  const activeLineIndex = getActiveLineIndex(progressRatio);
  if (activeLineIndex >= 0) {
    highlightLine(activeLineIndex);
  } else {
    clearLineHighlights();
  }
}

// ==================== 初始化 ====================
window.addEventListener('DOMContentLoaded', () => {
  ensurePoemAudio();
  updateVoiceButtons();
  loadAudioManifest();
  renderGrid();
  setTimeout(() => document.getElementById('loading').classList.add('hide'), 600);
});

// ==================== 首页渲染 ====================
function renderGrid(filter = '') {
  const grid = document.getElementById('poemGrid');
  const f = filter.toLowerCase();
  const filtered = poems.filter(p =>
    !f || p.title.includes(f) || p.author.includes(f) || (p.desc && p.desc.includes(f))
  );
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">🔍</div><div>未找到相关诗词</div></div>';
    return;
  }
  grid.innerHTML = filtered.map((p, i) => {
    const idx = poems.indexOf(p);
    const preview = p.lines.map(l => l.map(c => c.c).join('')).join('，');
    return `<div class="poem-card fade-in" onclick="openPoem(${idx})" style="animation-delay:${i*30}ms">
      <div class="card-title">${p.title}</div>
      <div class="card-author">${p.dynasty} · ${p.author}</div>
      <div class="card-preview">${preview}</div>
    </div>`;
  }).join('');
}

function filterPoems() {
  renderGrid(document.getElementById('searchInput').value);
}

// ==================== 诗词详情 ====================
function openPoem(idx) {
  stopPlay();
  currentPoemIndex = idx;
  currentPoem = poems[idx];
  currentCharIndex = 0;
  currentLineIndex = -1;
  currentImgIndex = 0;

  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  document.getElementById('backBtn').style.display = 'block';

  document.getElementById('poemTitle').textContent = currentPoem.title;
  document.getElementById('poemAuthor').textContent = currentPoem.author;
  document.getElementById('poemDynasty').textContent = currentPoem.dynasty;

  // Render poem body with pinyin
  const body = document.getElementById('poemBody');
  body.innerHTML = currentPoem.lines.map((line, li) =>
    `<div class="poem-line" id="poem-line-${li}">${line.map((ch, ci) =>
      `<span class="char-group" data-line="${li}" data-char="${ci}">
        <span class="pinyin">${ch.p}</span>
        <span class="char">${ch.c}</span>
      </span>`
    ).join('')}</div>`
  ).join('');

  // Count total chars
  totalChars = currentPoem.lines.reduce((s, l) => s + l.length, 0);

  // Load images
  loadImages(idx);
  updateProgress(0);
  clearLineHighlights();
  preparePoemAudio(idx);
  window.scrollTo(0, 0);
}

function goHome() {
  stopPlay();
  currentPoemIndex = null;
  currentPoem = null;
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('backBtn').style.display = 'none';
  setAudioStatus('');
}

// ==================== 图片轮播 ====================
function loadImages(idx) {
  for (let i = 0; i < 3; i++) {
    const img = document.getElementById('img' + i);
    img.src = `images/${idx}_${i}.jpg`;
    img.className = i === 0 ? 'active' : 'inactive';
  }
  currentImgIndex = 0;
  updateDots();
}

function switchImage(newIdx) {
  if (newIdx === currentImgIndex) return;
  document.getElementById('img' + currentImgIndex).className = 'inactive';
  document.getElementById('img' + newIdx).className = 'active';
  currentImgIndex = newIdx;
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.carousel-dots span').forEach((d, i) => {
    d.className = i === currentImgIndex ? 'active' : '';
  });
}

function updateImageByProgress(progressRatio) {
  const clampedRatio = Math.max(0, Math.min(1, Number(progressRatio) || 0));
  if (clampedRatio < 1/3) switchImage(0);
  else if (clampedRatio < 2/3) switchImage(1);
  else switchImage(2);
}

// ==================== 音频朗诵 ====================
function togglePlay() {
  if (isPlaying) {
    pausePlay();
  } else {
    void startPlay({ reset: false });
  }
}

async function startPlay(options = {}) {
  if (!currentPoem || currentPoemIndex === null) return;
  ensurePoemAudio();
  const requestToken = invalidatePlaybackRequest();
  const { reset = true } = options;
  const resolvedTrack = resolveAudioTrack(currentPoemIndex, voiceMode);
  if (!resolvedTrack || !poemAudio) {
    preparePoemAudio(currentPoemIndex);
    return;
  }

  const shouldResume =
    !reset &&
    poemAudio.dataset?.trackSrc === resolvedTrack.src &&
    Number(poemAudio.currentTime) > 0;

  const track = shouldResume ? resolvedTrack : preparePoemAudio(currentPoemIndex);
  if (!track || !poemAudio) return;

  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸';
  poemAudio.playbackRate = speechRate;

  if (!shouldResume) {
    currentCharIndex = 0;
    currentLineIndex = -1;
    poemAudio.currentTime = 0;
    clearLineHighlights();
    switchImage(0);
    updateProgress(0);
  }

  try {
    await poemAudio.play?.();
    if (!isPlaybackRequestCurrent(requestToken)) return;
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    setAudioStatus('');
  } catch (error) {
    if (!isPlaybackRequestCurrent(requestToken)) return;
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    setAudioStatus('当前音频加载失败');
  }
}

function pausePlay() {
  invalidatePlaybackRequest();
  ensurePoemAudio();
  poemAudio?.pause?.();
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
}

function stopPlay() {
  invalidatePlaybackRequest();
  ensurePoemAudio();
  poemAudio?.pause?.();
  if (poemAudio) poemAudio.currentTime = 0;
  isPlaying = false;
  document.getElementById('playBtn').textContent = '▶';
  clearLineHighlights();
  currentCharIndex = 0;
  currentLineIndex = -1;
  switchImage(0);
  updateProgress(0);
}

function updateProgress(ratio = 0) {
  const clampedRatio = Math.max(0, Math.min(1, Number(ratio) || 0));
  const pct = Math.round(clampedRatio * 1000) / 10;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ==================== 语速控制 ====================
function changeSpeed(delta) {
  speechRate = Math.max(0.5, Math.min(2.0, speechRate + delta * 0.25));
  document.getElementById('speedLabel').textContent = speechRate.toFixed(1) + 'x';
  ensurePoemAudio();
  if (poemAudio) {
    poemAudio.playbackRate = speechRate;
  }
}
